services:
  - type: web
    name: pet-global-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: pet-global-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/petglobal.sqlite
      - key: UPLOAD_DIR
        value: /opt/render/project/src/data/uploads
      - key: COMMISSION_LOW_THRESHOLD_CENTS
        value: "100000"
      - key: COMMISSION_HIGH_THRESHOLD_CENTS
        value: "500000"
      - key: COMMISSION_TIER_LOW
        value: "0.10"
      - key: COMMISSION_TIER_MID
        value: "0.08"
      - key: COMMISSION_TIER_HIGH
        value: "0.06"
      - key: COMMISSION_CAP_CENTS
        value: "80000"
      - key: DEFAULT_SERVICE_FEE_CENTS
        value: "18000"
      - key: SERVICE_COMMISSION_RATE
        value: "0.15"
      - key: MOCK_PAYMENT_MODE
        value: "true"
      - key: PUBLIC_APP_URL
        value: https://pet-global-mocha.vercel.app
      - key: BACKEND_BASE_URL
        value: https://pet-global-api.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: I18N_ENABLED
        value: "true"
      - key: I18N_DEFAULT_LANG
        value: en
      - key: ALLOWED_ORIGINS
        value: https://pet-global-mocha.vercel.app
